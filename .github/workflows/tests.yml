name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      # No game installation on CI: the lexicon/knowledge indexes load empty
      # and rules are asserted by priority, not by localized names.
      - run: python -m pytest tests/ -v
